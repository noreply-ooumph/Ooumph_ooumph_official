name: Weekly Health Check

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday 2am UTC
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Verify Graph API token is valid
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://graph.facebook.com/v21.0/me?access_token=${{ secrets.GRAPH_PAGE_TOKEN }}")
          if [ "$STATUS" = "200" ]; then
            echo "GRAPH_PAGE_TOKEN valid — Graph API OK"
          else
            echo "ERROR: GRAPH_PAGE_TOKEN returned HTTP $STATUS — token may be invalid"
            echo "Action needed: regenerate token at developers.facebook.com and update GRAPH_PAGE_TOKEN secret"
            exit 1
          fi

      - name: Verify GROQ_API_KEY is set
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "ERROR: GROQ_API_KEY secret is not set"
            exit 1
          fi
          echo "GROQ_API_KEY is set — OK"

      - name: All checks passed
        run: echo "Health check complete — ooumph_official replier is fully operational via Graph API"
